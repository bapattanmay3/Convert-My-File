{% extends "base.html" %}
{% block content %}
<div class="tool-container">
    <div class="tool-header">
        <h1>🔄 Convert My File - Converter</h1>
        <p>Convert PDF, DOC, DOCX and TXT with perfect structure preservation</p>
    </div>

    <div class="converter-card">
        <!-- Upload Area -->
        <div class="upload-area" id="fileDropArea">
            <div class="upload-content">
                <span class="upload-icon">📁</span>
                <h3>Drag & Drop or Click to Upload</h3>
                <p>Supported: PDF, DOC, DOCX, TXT (Max 50MB)</p>
                <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" hidden>
                <button class="btn-premium" style="padding: 10px 25px;" id="fileBrowseBtn">Choose File</button>
            </div>
        </div>

        <!-- File Info -->
        <div id="fileInfo" class="file-info" style="display: none;">
            <div class="file-details">
                <span class="file-icon">📄</span>
                <div class="file-meta">
                    <strong id="fileFileName"></strong>
                    <span id="fileFileSize"></span>
                </div>
                <button id="fileRemoveBtn" class="btn-icon">✖</button>
            </div>
        </div>

        <!-- Conversion Options -->
        <div id="fileOptions" class="convert-options" style="display: none;">
            <div class="option-group">
                <label>Convert to:</label>
                <select id="fileFormatSelect" class="form-select">
                    <!-- Options populated dynamically -->
                </select>
            </div>

            <button id="fileConvertBtn" class="btn-premium" style="width: 100%; margin-top: 20px;">
                🚀 Start Conversion
            </button>
        </div>

        <!-- Result Area -->
        <div id="fileResult" class="result-area" style="display: none;"></div>
    </div>
</div>

<style>
    .file-details {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
    }

    .file-icon {
        font-size: 2rem;
    }

    .file-meta {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .file-meta strong {
        color: white;
        margin-bottom: 5px;
    }

    .file-meta span {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .btn-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-icon:hover {
        background: rgba(255, 107, 74, 0.2);
        color: var(--primary);
    }

    .option-group {
        margin: 20px 0;
    }

    .option-group label {
        display: block;
        margin-bottom: 10px;
        color: white;
    }

    .form-select {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        background: #1a1a1a;
        border: 1px solid var(--glass-border);
        color: white;
    }

    .result-area {
        margin-top: 20px;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
    }

    .success {
        background: rgba(76, 175, 80, 0.1);
        border: 1px solid #4CAF50;
        color: #4CAF50;
        padding: 15px;
        border-radius: 8px;
    }

    .error {
        background: rgba(244, 67, 54, 0.1);
        border: 1px solid #F44336;
        color: #F44336;
        padding: 15px;
        border-radius: 8px;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const fileDropArea = document.getElementById('fileDropArea');
        const fileInput = document.getElementById('fileInput');
        const fileBrowseBtn = document.getElementById('fileBrowseBtn');
        const fileInfo = document.getElementById('fileInfo');
        const fileFileName = document.getElementById('fileFileName');
        const fileFileSize = document.getElementById('fileFileSize');
        const fileRemoveBtn = document.getElementById('fileRemoveBtn');
        const fileOptions = document.getElementById('fileOptions');
        const fileFormatSelect = document.getElementById('fileFormatSelect');
        const fileConvertBtn = document.getElementById('fileConvertBtn');
        const fileResult = document.getElementById('fileResult');

        let selectedFile = null;

        const formatOptions = {
            'pdf': ['docx', 'txt', 'xlsx', 'html'],
            'docx': ['pdf', 'txt', 'html'],
            'doc': ['docx', 'pdf', 'txt'],
            'txt': ['pdf', 'docx']
        };

        fileBrowseBtn.onclick = () => fileInput.click();
        fileDropArea.onclick = (e) => { if (e.target !== fileBrowseBtn) fileInput.click(); };

        fileInput.onchange = (e) => {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                const ext = selectedFile.name.split('.').pop().toLowerCase();
                const options = formatOptions[ext] || [];

                fileFormatSelect.innerHTML = '';
                options.forEach(format => {
                    const option = document.createElement('option');
                    option.value = format;
                    option.textContent = format.toUpperCase();
                    fileFormatSelect.appendChild(option);
                });

                fileFileName.textContent = selectedFile.name;
                fileFileSize.textContent = (selectedFile.size / 1024).toFixed(1) + ' KB';

                fileInfo.style.display = 'block';
                fileOptions.style.display = 'block';
                fileDropArea.style.display = 'none';
                fileResult.style.display = 'none';
            }
        };

        fileRemoveBtn.onclick = () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.style.display = 'none';
            fileOptions.style.display = 'none';
            fileDropArea.style.display = 'block';
            fileResult.style.display = 'none';
        };

        fileConvertBtn.onclick = async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('format', fileFormatSelect.value);

            fileConvertBtn.disabled = true;
            fileConvertBtn.innerHTML = '⏳ Processing High-Fidelity Render...';
            fileResult.style.display = 'none';

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    startDeletionTimer(); // Global from base.html
                    fileResult.innerHTML = `<div class="success">
                        ✅ <b>Conversion Complete!</b><br>
                        <span style="font-size: 0.9rem; display: block; margin: 10px 0;">${data.message}</span>
                        <a href="${data.download_url}" class="btn-premium" style="display: inline-block; padding: 8px 20px; font-size: 0.9rem;">⬇️ Download File</a>
                    </div>`;
                } else {
                    fileResult.innerHTML = `<div class="error">❌ <b>Conversion Failed:</b> ${data.error}</div>`;
                }
            } catch (error) {
                fileResult.innerHTML = `<div class="error">❌ Network error. Please try again.</div>`;
            } finally {
                fileConvertBtn.disabled = false;
                fileConvertBtn.innerHTML = '🚀 Start Conversion';
                fileResult.style.display = 'block';
            }
        };
    });
</script>
{% endblock %}
